# This forms the base of Appointment-based task definitions. The blank fields commented here must be set on any
# inheriting task definition:
#   family:
#   cpu:
#   memory:
#   container_definitions:
.apmt_taskdef: &APMT_TASK_DEFINITION
  network_mode: awsvpc
  requires_compatibilities:
   - FARGATE

# This forms the base of Appointment-based container definitions. The blank fields commented here must be set on any
# inheriting container definition:
#   environment
#   logConfiguration
#   portMappings
.apmt_contdef: &APMT_CONTAINER_DEFINITION
  image: *APMT_IMAGE
  essential: true
  mountPoints: []
  linuxParameters:
    initProcessEnabled: True
  restartPolicy:
    enabled: yes
    restartAttemptPeriod: 300
  secrets:
    - *SECRET_APP_ADMIN_ALLOW_LIST
    - *SECRET_APPOINTMENT_CALDAV_SECRET
    - *SECRET_DATABASE_HOST
    - *SECRET_DATABASE_NAME
    - *SECRET_DATABASE_PASSWORD
    - *SECRET_DATABASE_USERNAME
    - *SECRET_DB_SECRET
    - *SECRET_FXA_ALLOW_LIST
    - *SECRET_FXA_CLIENT_ID
    - *SECRET_FXA_OPEN_ID_CONFIG
    - *SECRET_FXA_SECRET
    - *SECRET_GOOGLE_AUTH_CLIENT_ID
    - *SECRET_GOOGLE_AUTH_PROJECT_ID
    - *SECRET_GOOGLE_AUTH_SECRET
    - *SECRET_JWT_SECRET
    - *SECRET_OIDC_CLIENT_ID
    - *SECRET_OIDC_CLIENT_SECRET
    - *SECRET_POSTHOG_PROJECT_KEY
    - *SECRET_SESSION_SECRET
    - *SECRET_SIGNED_SECRET
    - *SECRET_SMTP_PASS
    - *SECRET_SMTP_URL
    - *SECRET_SMTP_USER
    - *SECRET_ZOOM_API_SECRET
    - *SECRET_ZOOM_AUTH_CLIENT_ID
    - *SECRET_ZOOM_AUTH_SECRET


resources:

  domains:
    redis: cache.appointment.tb.pro

  tb:cloudwatch:LogDestination:
    appointment:
      org_name: tb

  tb:network:MultiCidrVpc:
    appointment:
      cidr_block: 10.20.0.0/16
      subnets:
        eu-central-1a:
          - 10.20.0.0/17
        eu-central-1b:
          - 10.20.128.0/17
      enable_internet_gateway: True
      egress_via_internet_gateway: True
      enable_dns_hostnames: True
      endpoint_interfaces:
        - ecr.api
        - ecr.dkr
        - logs
        - secretsmanager
  
  # The __main.py__ here is very specific in the following way:
  # For each ECS cluster you eventually define, you **must** have one entry by the same exact name in the
  # `load_balancers` and `containers` sections below. If the cluster does not expose a service (f/ex, uses
  # `build_load_balancer: False`), you may set the `load_balancers` entry to `null`.
  tb:network:SecurityGroupWithRules:
    load_balancers:
      backend:
        rules:
          ingress:
            - description: TLS traffic to the load balancer from the world
              cidr_blocks:
                - 0.0.0.0/0
              protocol: tcp
              from_port: 443
              to_port: 443
          egress:
            - description: Allow outbound traffic to anywhere
              protocol: tcp
              from_port: 0
              to_port: 65535
              cidr_blocks:
                - 0.0.0.0/0
        
    containers:
      backend:
        rules:
          ingress:
            - description: Allow traffic from the load balancer to the container
              # Sources are set in code
              protocol: tcp
              from_port: 5000
              to_port: 5000
          egress:
            - description: Allow traffic from the container out to the Internet
              protocol: tcp
              from_port: 0
              to_port: 65535
              cidr_blocks:
                - 0.0.0.0/0
    
    other:
      backend_cache:
        rules:
          ingress:
            - description: Primary Redis traffic
              # source_sgs set in code
              protocol: tcp
              from_port: 6379
              to_port: 6379
            - description: Replica Redis traffic
              # source_sgs set in code
              protocol: tcp
              from_port: 6380
              to_port: 6380
            # - description: Allow Redis traffic from Celery
            #   protocol: tcp
            #   from_port: 6379
            #   to_port: 6379
            #   source_security_group_id: 
            # - description: Allow Redis traffic from Flower
            #   protocol: tcp
            #   from_port: 6379
            #   to_port: 6379
            #   source_security_group_id: 
          egress:
            - description: Allow outbound traffic to anywhere
              protocol: tcp
              from_port: 0
              to_port: 65535
              cidr_blocks:
                - 0.0.0.0/0
  
  tb:secrets:PulumiSecretsManager:
    pulumi:
      recovery_window_in_days: 0
      secret_names:
        - appointment-caldav-secret
        - database-encryption-secret
        - database-host
        - database-name
        - database-password
        - database-user
        - fxa-admin-list
        - fxa-allow-list
        - fxa-client-id
        - fxa-openid-config
        - fxa-secret
        - google-auth-client-id
        - google-auth-secret
        - google-auth-project-id
        - jwt-secret
        - oidc-client-id
        - oidc-client-secret
        - posthog-project-key
        - session-encryption-secret
        - signed-url-secret
        - smtp-password
        - smtp-url
        - smtp-username
        - x-allow-secret
        - zoom-api-secret
        - zoom-auth-secret
        - zoom-client-id

  tb:ec2:SshableInstance: {}
  # Fill out this template to build an SSH bastion
  # tb:ec2:SshableInstance:
  #   bastion:
  #     ssh_keypair_name: your-ec2-keypair
  #     source_cidrs:
  #       - your.ip.addr.ess/32

  aws:elasticache:ServerlessCache:
    backend:
      description: Appointment backend (prod)
      engine: redis
      major_engine_version: "7"

  tb:fargate:FargateClusterWithLogging:
    backend:
      assign_public_ip: True
      desired_count: 1
      health_check_grace_period_seconds: 30 # Time before the LB checks for health of a new backend
      internal: False
      services:
        backend:
          listener_port: 443
          listener_proto: HTTPS
          listener_cert_arn: arn:aws:acm:eu-central-1:768512802988:certificate/249fcf3e-0cf2-48ea-b6dc-17239799b3f4
          container_port: 5000
          container_name: backend
          # "name" field is arbitrary, but must be unique and no longer than 32 chars
          name: appointment-backend-prod
          health_check:
            healthy_threshold: 2
            unhealthy_threshold: 5
            interval: 30
            path: /
            port: 5000
      task_definition:
        <<: *APMT_TASK_DEFINITION
        cpu: 512
        memory: 2048
        container_definitions:
          backend:
            <<: *APMT_CONTAINER_DEFINITION
            logConfiguration:
              logDriver: awslogs
              options:
                awslogs-group: /tb/prod/appointment
                awslogs-stream-prefix: ecs
                awslogs-region: eu-central-1
            portMappings:
              - name: backend
                containerPort: 5000
                hostPort: 5000
                protocol: tcp
                appProtocol: http
            environment:
              - *VAR_APP_ENV
              - *VAR_AUTH_SCHEME
              - *VAR_DATABASE_ENGINE
              - *VAR_DATABASE_PORT
              - *VAR_FRONTEND_URL
              - *VAR_FXA_CALLBACK
              - *VAR_GOOGLE_AUTH_CALLBACK
              - *VAR_JWT_ALGO
              - *VAR_JWT_EXPIRE_IN_MINS
              - *VAR_LOG_LEVEL
              - *VAR_LOG_USE_STREAM
              - *VAR_OIDC_EXP_GRACE_PERIOD
              - *VAR_OIDC_FALLBACK_MATCH_BY_EMAIL
              - *VAR_OIDC_TOKEN_INTROSPECTION_URL
              - *VAR_POSTHOG_HOST
              - *VAR_REDIS_DB
              - *VAR_REDIS_PORT
              - *VAR_REDIS_URL
              - *VAR_REDIS_USE_SSL
              - *VAR_REDIS_USE_CLUSTER
              - *VAR_SENTRY_DSN
              - *VAR_SERVICE_EMAIL
              - *VAR_SHORT_BASE_URL
              - *VAR_SMTP_PORT
              - *VAR_SMTP_SECURITY
              - *VAR_TB_ACCOUNTS_CALDAV_URL
              - *VAR_TB_ACCOUNTS_HOST
              - *VAR_TIER_BASIC_CALENDAR_LIMIT
              - *VAR_TIER_PLUS_CALENDAR_LIMIT
              - *VAR_TIER_PRO_CALENDAR_LIMIT
              - *VAR_ZOOM_API_ENABLED
              - *VAR_ZOOM_API_NEW_APP
              - *VAR_ZOOM_AUTH_CALLBACK
              - name: CONTAINER_ROLE
                value: api

  tb:autoscale:EcsServiceAutoscaler:
    backend:
      cpu_threshold: 80
      ram_threshold: 80
      cooldown: 180
      disable_scale_in: False
      min_capacity: 2
      max_capacity: 4
      suspend: False

  tb:fargate:AutoscalingFargateCluster:
    appointment:
      cluster: {}

      cluster_name: appointment-prod

      task_definitions:
        celery:
          <<: *APMT_TASK_DEFINITION
          family: appointment-prod-celery
          cpu: 512
          memory: 1024
          container_definitions:
            - <<: *APMT_CONTAINER_DEFINITION
              name: celery
              logConfiguration:
                logDriver: awslogs
                options:
                  awslogs-group: /tb/prod/appointment
                  awslogs-stream-prefix: ecs
                  awslogs-region: eu-central-1
              environment:
                - *VAR_APP_ENV
                - *VAR_AUTH_SCHEME
                - *VAR_DATABASE_ENGINE
                - *VAR_DATABASE_PORT
                - *VAR_FRONTEND_URL
                - *VAR_FXA_CALLBACK
                - *VAR_GOOGLE_AUTH_CALLBACK
                - *VAR_JWT_ALGO
                - *VAR_JWT_EXPIRE_IN_MINS
                - *VAR_LOG_LEVEL
                - *VAR_LOG_USE_STREAM
                - *VAR_OIDC_EXP_GRACE_PERIOD
                - *VAR_OIDC_FALLBACK_MATCH_BY_EMAIL
                - *VAR_OIDC_TOKEN_INTROSPECTION_URL
                - *VAR_POSTHOG_HOST
                - *VAR_REDIS_DB
                - *VAR_REDIS_PORT
                - *VAR_REDIS_URL
                - *VAR_REDIS_USE_SSL
                - *VAR_REDIS_USE_CLUSTER
                - *VAR_SENTRY_DSN
                - *VAR_SERVICE_EMAIL
                - *VAR_SHORT_BASE_URL
                - *VAR_SMTP_PORT
                - *VAR_SMTP_SECURITY
                - *VAR_TB_ACCOUNTS_CALDAV_URL
                - *VAR_TB_ACCOUNTS_HOST
                - *VAR_TIER_BASIC_CALENDAR_LIMIT
                - *VAR_TIER_PLUS_CALENDAR_LIMIT
                - *VAR_TIER_PRO_CALENDAR_LIMIT
                - *VAR_ZOOM_API_ENABLED
                - *VAR_ZOOM_API_NEW_APP
                - name: CONTAINER_ROLE
                  value: worker
        flower:
          <<: *APMT_TASK_DEFINITION
          family: appointment-prod-flower
          cpu: 512
          memory: 1024
          container_definitions:
            - <<: *APMT_CONTAINER_DEFINITION
              name: flower
              logConfiguration:
                logDriver: awslogs
                options:
                  awslogs-group: /tb/prod/appointment
                  awslogs-stream-prefix: ecs
                  awslogs-region: eu-central-1
              portMappings:
                - containerPort: 5555
                  hostPort: 5555
                  protocol: tcp
              environment:
                - *VAR_APP_ENV
                - *VAR_AUTH_SCHEME
                - *VAR_DATABASE_ENGINE
                - *VAR_DATABASE_PORT
                - *VAR_FRONTEND_URL
                - *VAR_FXA_CALLBACK
                - *VAR_GOOGLE_AUTH_CALLBACK
                - *VAR_JWT_ALGO
                - *VAR_JWT_EXPIRE_IN_MINS
                - *VAR_LOG_LEVEL
                - *VAR_LOG_USE_STREAM
                - *VAR_OIDC_EXP_GRACE_PERIOD
                - *VAR_OIDC_FALLBACK_MATCH_BY_EMAIL
                - *VAR_OIDC_TOKEN_INTROSPECTION_URL
                - *VAR_POSTHOG_HOST
                - *VAR_REDIS_DB
                - *VAR_REDIS_PORT
                - *VAR_REDIS_URL
                - *VAR_REDIS_USE_SSL
                - *VAR_REDIS_USE_CLUSTER
                - *VAR_SENTRY_DSN
                - *VAR_SERVICE_EMAIL
                - *VAR_SHORT_BASE_URL
                - *VAR_SMTP_PORT
                - *VAR_SMTP_SECURITY
                - *VAR_TB_ACCOUNTS_CALDAV_URL
                - *VAR_TB_ACCOUNTS_HOST
                - *VAR_TIER_BASIC_CALENDAR_LIMIT
                - *VAR_TIER_PLUS_CALENDAR_LIMIT
                - *VAR_TIER_PRO_CALENDAR_LIMIT
                - *VAR_ZOOM_API_ENABLED
                - *VAR_ZOOM_API_NEW_APP
                - name: CONTAINER_ROLE
                  value: flower
                - name: FLOWER_UNAUTHENTICATED_API
                  value: "true"
      
      targets:
        flower:
          name: apmt-prod-flower
          health_check:
            enabled: true
            healthy_threshold: 3
            interval: 15
            path: /
            port: 5555
            protocol: HTTP
            timeout: 5
            unhealthy_threshold: 3
          port: 5555
          protocol: HTTP
          target_type: ip
          ip_address_type: ipv4

      load_balancers:
        flower:
          enable_cross_zone_load_balancing: yes
          internal: yes
          ip_address_type: ipv4
          load_balancer_type: application
          name: apmt-flower-prod

      container_security_groups:
        celery:
          none:
            description: Network config for Celery containers in appointment-prod
            rules:
              egress:
                - from_port: 0
                  to_port: 65535
                  protocol: tcp
                  description: Allow all egress
                  cidr_blocks:
                    - 0.0.0.0/0
              ingress: []  # Celery is a "pull" based system, requiring no ingress
        flower:    # Service to connect
          flower:  # LB to allow connections from
            description: Network config for Flower containers in appointment-prod
            rules:
              egress:
                - from_port: 0
                  to_port: 65535
                  protocol: tcp
