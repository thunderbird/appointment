---
### Special variables used throughout this file

# Update this value to update all containers based on this thunderbird/accounts image
.appointment_image: &APPOINTMENT_IMAGE 768512802988.dkr.ecr.eu-central-1.amazonaws.com/thunderbird/appointment:22f638c2d66d8aa7141321a4cdb661694ceb6665

# These variables go into the Appointment container environments
.app_env: &VAR_APP_ENV {name: "APP_ENV", value: "dev"}
.auth_scheme: &VAR_AUTH_SCHEME {name: "AUTH_SCHEME", value: "oidc"}
.database_engine: &VAR_DATABASE_ENGINE {name: "DATABASE_ENGINE", value: "postgres"}
.database_port: &VAR_DATABASE_PORT {name: "DATABASE_PORT", value: "5432"}
.frontend_url: &VAR_FRONTEND_URL {name: "FRONTEND_URL", value: "https://appointment-dev.tb.pro"}
.jwt_algo: &VAR_JWT_ALGO {name: "JWT_ALGO", value: "HS256"}
.jwt_expire_in_mins: &VAR_JWT_EXPIRE_IN_MINS {name: "JWT_EXPIRE_IN_MINS", value: "10000"}
.log_level: &VAR_LOG_LEVEL {name: "LOG_LEVEL", value: "ERROR"}
.log_use_stream: &VAR_LOG_USE_STREAM {name: "LOG_USE_STREAM", value: "True"}
.oidc_exp_grace_period: &VAR_OIDC_EXP_GRACE_PERIOD {name: "OIDC_EXP_GRACE_PERIOD", value: "60"}
.oidc_fallback_match_by_email: &VAR_OIDC_FALLBACK_MATCH_BY_EMAIL {name: "OIDC_FALLBACK_MATCH_BY_EMAIL", value: "True"}
.oidc_token_intropsection_url: &VAR_OIDC_TOKEN_INTROSPECTION_URL {name: "OIDC_TOKEN_INTROSPECTION_URL", value: "https://auth-stage.tb.pro/realms/tbpro/protocol/openid-connect/token/introspect"}
.redis_db: &VAR_REDIS_DB {name: "REDIS_DB", value: "0"}
.redis_port: &VAR_REDIS_PORT {name: "REDIS_PORT", value: "6379"}
.redis_url: &VAR_REDIS_URL {name: "REDIS_URL", value: "appointment-dev-cache-backend-619e0e3-7syyoy.serverless.euc1.cache.amazonaws.com:6379"}
.redis_use_cluster: &VAR_REDIS_USE_CLUSTER {name: "REDIS_USE_CLUSTER", value: "True"}
.redis_use_ssl: &VAR_REDIS_USE_SSL {name: "REDIS_USE_SSL", value: "True"}
.sentry_dsn: &VAR_SENTRY_DSN {name: "SENTRY_DSN", value: "https://5dddca3ecc964284bb8008bc2beef808@o4505428107853824.ingest.sentry.io/4505428124827648"}
.service_email: &VAR_SERVICE_EMAIL {name: "SERVICE_EMAIL", value: "no-reply@appointment-dev.tb.pro"}
.short_base_url: &VAR_SHORT_BASE_URL {name: "SHORT_BASE_URL", value: "https://dev.apt.mt"}
.tb_accounts_caldav_url: &VAR_TB_ACCOUNTS_CALDAV_URL {name: "TB_ACCOUNTS_CALDAV_URL", value: "https://dev-thundermail.com"}
.tier_basic_calendar_limit: &VAR_TIER_BASIC_CALENDAR_LIMIT {name: "TIER_BASIC_CALENDAR_LIMIT", value: "3"}
.tier_plus_calendar_limit: &VAR_TIER_PLUS_CALENDAR_LIMIT {name: "TIER_PLUS_CALENDAR_LIMIT", value: "5"}
.tier_pro_calendar_limit: &VAR_TIER_PRO_CALENDAR_LIMIT {name: "TIER_PRO_CALENDAR_LIMIT", value: "5"}
.zoom_api_enabled: &VAR_ZOOM_API_ENABLED {name: "ZOOM_API_ENABLED", value: "True"}
.zoom_auth_callback: &VAR_ZOOM_AUTH_CALLBACK {name: "ZOOM_AUTH_CALLBACK", value: "https://appointment-dev.tb.pro/api/v1/zoom/callback"}

# These variables go into container defintions, referring to secret values
.database_host: &SECRET_DATABASE_HOST {name: "DATABASE_HOST", valueFrom: "arn:aws:secretsmanager:eu-central-1:768512802988:secret:appointment/dev/database-host-9udgGP"}
.database_name: &SECRET_DATABASE_NAME {name: "DATABASE_NAME", valueFrom: "arn:aws:secretsmanager:eu-central-1:768512802988:secret:appointment/dev/database-name-ajG5gL"}
.database_user: &SECRET_DATABASE_USER {name: "DATABASE_USERNAME", valueFrom: "arn:aws:secretsmanager:eu-central-1:768512802988:secret:appointment/dev/database-user-ARowLy"}
.database_password: &SECRET_DATABASE_PASSWORD {name: "DATABASE_PASSWORD", valueFrom: "arn:aws:secretsmanager:eu-central-1:768512802988:secret:appointment/dev/database-password-yetVzH"}
.oidc_client_id: &SECRET_OIDC_CLIENT_ID {name: "OIDC_CLIENT_ID", valueFrom: "arn:aws:secretsmanager:eu-central-1:768512802988:secret:appointment/dev/oidc-client-id-yaAyEa"}
.oidc_client_secret: &SECRET_OIDC_CLIENT_SECRET {name: "OIDC_CLIENT_SECRET", valueFrom: "arn:aws:secretsmanager:eu-central-1:768512802988:secret:appointment/dev/oidc-client-secret-uSFyGx"}

# This forms the base of Appointment-based task definitions. The blank fields commented here must be set on any
# inheriting task definition:
#   family:
#   cpu:
#   memory:
#   container_definitions:
.appointment_taskdef: &APPOINTMENT_TASK_DEFINITION
  network_mode: awsvpc
  requires_compatibilities:
   - FARGATE

# This forms the base of Accounts-based container definitions. The blank fields commented here must be set on any
# inheriting container definition:
#   environment:
#   logConfiguration:
.appointment_contdef: &APPOINTMENT_CONTAINER_DEFINITION
  image: *APPOINTMENT_IMAGE
  essential: true
  mountPoints: []
  linuxParameters:
    initProcessEnabled: True
  restartPolicy:
    enabled: yes
    restartAttemptPeriod: 300
  secrets:
    - *SECRET_DATABASE_HOST
    - *SECRET_DATABASE_NAME
    - *SECRET_DATABASE_PASSWORD
    - *SECRET_DATABASE_USER
    - *SECRET_OIDC_CLIENT_ID
    - *SECRET_OIDC_CLIENT_SECRET

resources:

  domains:
    redis: cache.appointment-dev.tb.pro

  tb:cloudwatch:LogDestination:
    appointment:
      log_group:
        retention_in_days: 7
      org_name: tb

  tb:network:MultiCidrVpc:
    appointment:
      cidr_block: 10.22.0.0/16
      subnets:
        eu-central-1a:
          - 10.22.0.0/17
        eu-central-1b:
          - 10.22.128.0/17
      enable_internet_gateway: True
      egress_via_internet_gateway: True
      enable_dns_hostnames: True
      endpoint_interfaces:
        - ecr.api
        - ecr.dkr
        - logs
        - secretsmanager
  
  # The __main.py__ here is very specific in the following way:
  # For each ECS cluster you eventually define, you **must** have one entry by the same exact name in the
  # `load_balancers` and `containers` sections below. If the cluster does not expose a service (f/ex, uses
  # `build_load_balancer: False`), you may set the `load_balancers` entry to `null`.
  tb:network:SecurityGroupWithRules:
    load_balancers:
      backend:
        rules:
          ingress:
            - description: TLS traffic to the load balancer from the world
              cidr_blocks:
                - 0.0.0.0/0
              protocol: tcp
              from_port: 443
              to_port: 443
          egress:
            - description: Allow outbound traffic to anywhere
              protocol: tcp
              from_port: 0
              to_port: 65535
              cidr_blocks:
                - 0.0.0.0/0
        
    containers:
      backend:
        rules:
          ingress:
            - description: Allow traffic from the load balancer to the container
              # Sources are set in code
              protocol: tcp
              from_port: 5000
              to_port: 5000
          egress:
            - description: Allow traffic from the container out to the Internet
              protocol: tcp
              from_port: 0
              to_port: 65535
              cidr_blocks:
                - 0.0.0.0/0
    
    other:
      backend_cache:
        rules:
          ingress:
            - description: Primary Redis traffic
              # source_sgs set in code
              protocol: tcp
              from_port: 6379
              to_port: 6379
            - description: Replica Redis traffic
              # source_sgs set in code
              protocol: tcp
              from_port: 6380
              to_port: 6380
          egress:
            - description: Allow outbound traffic to anywhere
              protocol: tcp
              from_port: 0
              to_port: 65535
              cidr_blocks:
                - 0.0.0.0/0
  
  tb:secrets:PulumiSecretsManager:
    pulumi:
      recovery_window_in_days: 0
      secret_names:
        - database-encryption
        - database-host
        - database-name
        - database-password
        - database-user
        - fxa-secrets
        - google-oauth
        - oidc-client-id
        - oidc-client-secret
        - smtp-connection
        - x-allow-secret
        - zoom-secrets

  tb:ec2:SshableInstance: {}
  # Fill out this template to build an SSH bastion
  # tb:ec2:SshableInstance:
  #   bastion:
  #     ssh_keypair_name: your-ec2-keypair
  #     source_cidrs:
  #       - your.ip.addr.ess/32

  aws:elasticache:ServerlessCache:
    backend:
      description: Appointment backend (dev)
      engine: redis
      major_engine_version: "7"

  tb:fargate:AutoscalingFargateCluster:
    appointment:
      cluster: {}
      cluster_name: 'appointment-dev'
      task_definitions:
        celery:
          <<: *APPOINTMENT_TASK_DEFINITION
          family: appointment-celery-dev
          cpu: 512
          memory: 1024
          container_definitions:
            - <<: *APPOINTMENT_CONTAINER_DEFINITION
              name: celery
              logConfiguration:
                logDriver: awslogs
                options:
                  awslogs-group: /tb/dev/appointment
                  awslogs-stream-prefix: celery/
                  awslogs-region: eu-central-1
              environment:
                - *VAR_APP_ENV
                - *VAR_AUTH_SCHEME
                - *VAR_DATABASE_ENGINE
                - *VAR_DATABASE_PORT
                - *VAR_FRONTEND_URL
                - *VAR_JWT_ALGO
                - *VAR_JWT_EXPIRE_IN_MINS
                - *VAR_LOG_LEVEL
                - *VAR_LOG_USE_STREAM
                - *VAR_OIDC_EXP_GRACE_PERIOD
                - *VAR_OIDC_FALLBACK_MATCH_BY_EMAIL
                - *VAR_OIDC_TOKEN_INTROSPECTION_URL
                - *VAR_REDIS_DB
                - *VAR_REDIS_PORT
                - *VAR_REDIS_URL
                - *VAR_REDIS_USE_CLUSTER
                - *VAR_REDIS_USE_SSL
                - *VAR_SENTRY_DSN
                - *VAR_SERVICE_EMAIL
                - *VAR_SHORT_BASE_URL
                - *VAR_TB_ACCOUNTS_CALDAV_URL
                - *VAR_TIER_BASIC_CALENDAR_LIMIT
                - *VAR_TIER_PLUS_CALENDAR_LIMIT
                - *VAR_TIER_PRO_CALENDAR_LIMIT
                - *VAR_ZOOM_API_ENABLED

        flower:
          <<: *APPOINTMENT_TASK_DEFINITION
          family: appointment-flower-dev
          cpu: 512
          memory: 1024
          container_definitions:
            - <<: *APPOINTMENT_CONTAINER_DEFINITION
              name: flower
              logConfiguration:
                logDriver: awslogs
                options:
                  awslogs-group: /tb/dev/appointment
                  awslogs-stream-prefix: flower/
                  awslogs-region: eu-central-1
              portMappings:
                - containerPort: 5555
                  hostPort: 5555
                  protocol: tcp
              environment:
                - *VAR_APP_ENV
                - *VAR_AUTH_SCHEME
                - *VAR_DATABASE_ENGINE
                - *VAR_DATABASE_PORT
                - *VAR_FRONTEND_URL
                - *VAR_JWT_ALGO
                - *VAR_JWT_EXPIRE_IN_MINS
                - *VAR_LOG_LEVEL
                - *VAR_LOG_USE_STREAM
                - *VAR_OIDC_EXP_GRACE_PERIOD
                - *VAR_OIDC_FALLBACK_MATCH_BY_EMAIL
                - *VAR_OIDC_TOKEN_INTROSPECTION_URL
                - *VAR_REDIS_DB
                - *VAR_REDIS_PORT
                - *VAR_REDIS_URL
                - *VAR_REDIS_USE_CLUSTER
                - *VAR_REDIS_USE_SSL
                - *VAR_SENTRY_DSN
                - *VAR_SERVICE_EMAIL
                - *VAR_SHORT_BASE_URL
                - *VAR_TB_ACCOUNTS_CALDAV_URL
                - *VAR_TIER_BASIC_CALENDAR_LIMIT
                - *VAR_TIER_PLUS_CALENDAR_LIMIT
                - *VAR_TIER_PRO_CALENDAR_LIMIT
                - *VAR_ZOOM_API_ENABLED
      
      targets:
        flower:
          name: flower-dev
          health_check:
            enabled: true
            healthy_threshold: 3
            interval: 15
            path: /
            port: 5555
            protocol: HTTP
            timeout: 5
            unhealthy_threshold: 3
          port: 5555
          protocol: HTTP
          target_type: ip
          ip_address_type: ipv4

      load_balancers:
        flower:
          enable_cross_zone_load_balancing: yes
          internal: yes
          ip_address_type: ipv4
          load_balancer_type: application
          name: appointment-flower-dev

      container_security_groups:
        celery:  # Indicates the service whose containers get this SG
          none:  # Indicates no load balancer for this service
            description: Network config for Celery containers in accounts-dev
            rules:
              egress:
                - from_port: 0
                  to_port: 65535
                  protocol: tcp
                  description: Allow all egress
                  cidr_blocks:
                    - 0.0.0.0/0
              ingress: []  # Celery is a "pull" based system, requiring no ingress
        flower:    # Indicates the service whose containers get this SG
          flower:  # LB to allow connections from
            description: Network config for Flower containers in accounts-dev
            rules:
              egress:
                - from_port: 0
                  to_port: 65535
                  protocol: tcp
                  description: Allow all egress
                  cidr_blocks:
                    - 0.0.0.0/0
              ingress:
                - from_port: 5555
                  to_port: 5555
                  protocol: tcp
                  description: Allow traffic to Flower service

      load_balancer_security_groups:
        flower:  # LB to apply the rules to
          description: Network config for Flower load balancer in accounts-dev
          rules:
            egress:
              - from_port: 0
                to_port: 65535
                protocol: tcp
                description: Allow all egress
                cidr_blocks:
                  - 0.0.0.0/0
            ingress:
              - from_port: 443
                to_port: 443
                protocol: tcp
                description: Allow local TLS traffic only
                cidr_blocks:
                  - 10.22.0.0/16
      
      listeners:
        flower:  # Load balancer to attach to
          flower:  # Target to route traffic to
            certificate_arn: arn:aws:acm:eu-central-1:768512802988:certificate/1841c871-30f9-461e-ba30-20d172fb656f
            port: 443
            protocol: HTTPS

      services:
        celery:
          assign_public_ip: yes
          service:
            desired_count: 1
          target: null
        flower:
          assign_public_ip: yes
          container_name: flower
          container_port: 5555
          load_balancer: flower
          service:
            desired_count: 1
          target: flower

      registries:
        celery:
          - arn:aws:ecr:eu-central-1:768512802988:repository/thunderbird/appointment*
        flower:
          - arn:aws:ecr:eu-central-1:768512802988:repository/thunderbird/appointment*

      secrets:
        celery:
          - arn:aws:secretsmanager:eu-central-1:768512802988:secret:appointment/dev/*
        flower:
          - arn:aws:secretsmanager:eu-central-1:768512802988:secret:appointment/dev/*
      
      ssm_params: {}

      autoscalers:
        celery:
          min_capacity: 2
          max_capacity: 4
        flower:
          min_capacity: 1
          max_capacity: 1

  tb:fargate:FargateClusterWithLogging:
    backend:
      assign_public_ip: True
      desired_count: 1
      health_check_grace_period_seconds: 30 # Time before the LB checks for health of a new backend
      internal: False
      services:
        backend:
          listener_port: 443
          listener_proto: HTTPS
          listener_cert_arn: arn:aws:acm:eu-central-1:768512802988:certificate/3443266a-dd83-4ad7-9e35-15734466813c
          container_port: 5000
          container_name: backend
          # "name" field is arbitrary, but must be unique and no longer than 32 chars
          name: appointment-backend-dev
          health_check:
            healthy_threshold: 2
            unhealthy_threshold: 5
            interval: 30
            path: /
            port: 5000
      task_definition:
        network_mode: awsvpc
        cpu: 512
        memory: 2048
        requires_compatibilities:
          - FARGATE
        container_definitions:
          backend:
            image: 768512802988.dkr.ecr.eu-central-1.amazonaws.com/thunderbird/appointment:5201a66e89a9adf761aef44ea2a9453af9213558
            portMappings:
              - name: backend
                containerPort: 5000
                hostPort: 5000
                protocol: tcp
                appProtocol: http
            linuxParameters:
              initProcessEnabled: True
            secrets:
              - name: DATABASE_HOST
                valueFrom: arn:aws:secretsmanager:eu-central-1:768512802988:secret:appointment/dev/database-host-9udgGP
              - name: DATABASE_NAME
                valueFrom: arn:aws:secretsmanager:eu-central-1:768512802988:secret:appointment/dev/database-name-ajG5gL
              - name: DATABASE_USERNAME
                valueFrom: arn:aws:secretsmanager:eu-central-1:768512802988:secret:appointment/dev/database-user-ARowLy
              - name: DATABASE_PASSWORD
                valueFrom: arn:aws:secretsmanager:eu-central-1:768512802988:secret:appointment/dev/database-password-yetVzH
              # - name: DB_ENC_SECRET
              #   valueFrom: arn:aws:secretsmanager:eu-central-1:768512802988:secret:appointment/dev/database-encryption-wVW5q5
              # - name: FXA_SECRETS
              #   valueFrom: arn:aws:secretsmanager:eu-central-1:768512802988:secret:appointment/dev/fxa-secrets-9V5Bk5
              # - name: GOOGLE_OAUTH_SECRETS
              #   valueFrom: arn:aws:secretsmanager:eu-central-1:768512802988:secret:appointment/dev/google-oauth-fkGJlJ
              - name: OIDC_CLIENT_ID
                valueFrom: arn:aws:secretsmanager:eu-central-1:768512802988:secret:appointment/dev/oidc-client-id-yaAyEa
              - name: OIDC_CLIENT_SECRET
                valueFrom: arn:aws:secretsmanager:eu-central-1:768512802988:secret:appointment/dev/oidc-client-secret-uSFyGx
              #  - name: SMTP_SECRETS
              #    valueFrom: arn:aws:secretsmanager:eu-central-1:768512802988:secret:appointment/dev/smtp-connection-6QglYt
              # - name: ZOOM_SECRETS
              #   valueFrom: arn:aws:secretsmanager:eu-central-1:768512802988:secret:appointment/dev/zoom-secrets-0A8KzQ
            environment:
              - name: DATABASE_ENGINE
                value: postgresql
              - name: DATABASE_PORT
                value: '5432'
              - name: LOG_LEVEL
                value: ERROR
              - name: FRONTEND_URL
                value: https://appointment-dev.tb.pro
              - name: SHORT_BASE_URL
                value: https://dev.apt.mt
              - name: TIER_BASIC_CALENDAR_LIMIT
                value: "3"
              - name: TIER_PLUS_CALENDAR_LIMIT
                value: "5"
              - name: TIER_PRO_CALENDAR_LIMIT
                value: "10"
              - name: LOG_USE_STREAM
                value: "True"
              - name: APP_ENV
                value: dev
              - name: SENTRY_DSN
                value: https://5dddca3ecc964284bb8008bc2beef808@o4505428107853824.ingest.sentry.io/4505428124827648
              - name: ZOOM_API_ENABLED
                value: "True"
              - name: ZOOM_AUTH_CALLBACK
                value: https://appointment-stage.tb.pro/api/v1/zoom/callback
              - name: SERVICE_EMAIL
                value: no-reply@appointment-dev.tb.pro
              - name: AUTH_SCHEME
                value: "oidc"
              - name: JWT_ALGO
                value: "HS256"
              - name: JWT_EXPIRE_IN_MINS
                value: "10000"
              - name: REDIS_URL
                value: cache.appointment-dev.tb.pro
              - name: REDIS_PORT
                value: "6379"
              - name: REDIS_DB
                value: "0"
              - name: REDIS_USE_SSL
                value: "True"
              - name: REDIS_USE_CLUSTER
                value: "True"
              - name: OIDC_TOKEN_INTROSPECTION_URL
                value: "https://auth-stage.tb.pro/realms/tbpro/protocol/openid-connect/token/introspect"
              - name: OIDC_EXP_GRACE_PERIOD
                value: "60"
              - name: OIDC_FALLBACK_MATCH_BY_EMAIL
                value: "True"
              - name: TB_ACCOUNTS_CALDAV_URL
                value: https://stage-thundermail.com

  tb:autoscale:EcsServiceAutoscaler:
    backend:
      cpu_threshold: 80
      ram_threshold: 80
      cooldown: 180
      disable_scale_in: False
      min_capacity: 2
      max_capacity: 4
      suspend: False

  tb:cloudfront:CloudFrontS3Service:
    frontend:
      service_bucket_name: tb-appointment-dev-frontend
      # This cert must be hosted in us-east-1; this limitation is imposed by CloudFront
      certificate_arn: arn:aws:acm:us-east-1:768512802988:certificate/c172ccdd-425f-4fe3-a834-c0f603c2d46c
      distribution:
        aliases:
          - appointment-dev.tb.pro
        comment: Appointment dev frontend
        # Do not define ordered cache behaviors here; they are programmatically overridden
        logging_config:
          include_cookies: True

  # tb:cloudwatch:CloudWatchMonitoringGroup:
  #   cloudwatch:
  #     notify_emails:
  #       - thunderbird-services-monitoring@thunderbird.net
  #     config:
  #       alarms: {}

  # tb:ci:AwsAutomationUser:
  #   ci:
  #     additional_policies: []
  #     # - arn:aws:iam::768512802988:policy/appointment-dev-frontend-cache-invalidation
  #     enable_ecr_image_push: True
  #     ecr_repositories:
  #       - thunderbird/appointment
  #     enable_fargate_deployments: True
  #     fargate_clusters:
  #       - appointment-dev-fargate-backend
  #     fargate_task_role_arns:
  #       - arn:aws:iam::768512802988:role/appointment-dev-fargate-backend
  #     enable_full_s3_access: False
  #     enable_s3_bucket_upload: True
  #     s3_upload_buckets:
  #       - tb-appointment-dev-frontend