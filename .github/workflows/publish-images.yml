---
# Additive image-publish pipeline. On merge to main it builds the appointment
# backend and frontend (nginx SPA) images as native multi-arch (amd64 + arm64)
# manifest lists and pushes them to GHCR, tagged :<sha>, :v<version>, :latest.
#
# This is INDEPENDENT of the existing deploy pipeline (deploy-staging.yml /
# deploy-production.yml): it uses no cloud credentials, runs no Pulumi, touches
# no S3/ECS, and deploys nothing -- it only publishes images for the EKS/Kargo
# path. The env-specific S3/CloudFront + ECS builds are left untouched.
#
# The frontend image is configured at RUNTIME (window.__APP_CONFIG__ via
# /config.js), so one built bundle runs in every environment. See src/config.ts.
name: publish-images

concurrency:
  group: publish-images-${{ github.ref }}
  # Serialize (don't cancel) so every merged commit's :<sha> image gets published.
  cancel-in-progress: false

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # Decide which image(s) changed and read the version once, so the build jobs
  # below only run for images that actually changed.
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend-changed: ${{ steps.check.outputs.backend-changed }}
      frontend-changed: ${{ steps.check.outputs.frontend-changed }}
      version: ${{ steps.read-version.outputs.value }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: check
        with:
          filters: |
            backend-changed:
              - 'backend/**'
            frontend-changed:
              - 'frontend/**'

      - name: Read version from frontend/package.json
        id: read-version
        run: echo "value=$(jq -r .version frontend/package.json)" >> "$GITHUB_OUTPUT"

  backend:
    needs: detect-changes
    if: >-
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.backend-changed == 'true'
    uses: ./.github/workflows/build-multiarch-image.yml
    with:
      image: ghcr.io/thunderbird/thunderbird-appointment
      dockerfile: backend/Dockerfile
      context: backend
      version: ${{ needs.detect-changes.outputs.version }}
      artifact-prefix: backend

  frontend:
    needs: detect-changes
    if: >-
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.frontend-changed == 'true'
    uses: ./.github/workflows/build-multiarch-image.yml
    with:
      image: ghcr.io/thunderbird/thunderbird-appointment-frontend
      dockerfile: frontend/deploy.dockerfile
      context: frontend
      version: ${{ needs.detect-changes.outputs.version }}
      artifact-prefix: frontend
